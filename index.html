<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KNN CNN Demo</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #2f5d3a;
      color: #f5f5f5;
      font-family: monospace;
    }

    h1, h2 {
      margin: 0 0 12px 0;
      font-weight: normal;
    }

    .section {
      margin-bottom: 24px;
    }

    .terminal {
      background: #111;
      color: #d8ffd8;
      border: 1px solid #b7d8b7;
      padding: 12px;
      white-space: pre-wrap;
    }

    .images {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .card {
      width: 260px;
      background: #1b1b1b;
      border: 1px solid #b7d8b7;
      padding: 10px;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      margin-bottom: 10px;
      border: 1px solid #666;
    }

    .label {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="section">
    <h1>KNN CNN Demo</h1>
    <div class="terminal">Main version used for presentation.

Model type: KNN classifier
Feature extractor: pretrained ResNet18 embeddings
Overall validation accuracy: 0.8123
Best k: 1
Training images used: 3930
Validation images used: 1023</div>
  </div>

  <div class="section">
    <h2>Demo Images</h2>
    <div class="images" id="images"></div>
  </div>

  <script src="knn_cnn_demo_pool.js"></script>
  <script>
    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const demos = window.KNN_CNN_DEMO_POOL || [];
    const randomized = shuffle(demos).slice(0, 12);
    const imagesEl = document.getElementById("images");
    imagesEl.innerHTML = randomized.map((item) => `
      <div class="card">
        <img src="${item.image}" alt="${item.actual}">
        <div class="label">Actual: ${item.actual}</div>
        <div class="label">Predicted: ${item.predicted}</div>
        <div class="label">Result: ${item.result}</div>
      </div>
    `).join("");
  </script>
</body>
</html>
